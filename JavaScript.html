<script>
let currentUser = null;
let dashboardData = null;

document.addEventListener('DOMContentLoaded', async () => {
  await loadUserInfo();
  await loadDashboard();
  setupEventListeners();
});

async function loadUserInfo() {
  try {
    currentUser = await new Promise((resolve, reject) => {
      google.script.run
        .withSuccessHandler(resolve)
        .withFailureHandler(reject)
        .getCurrentUser();
    });
    
    document.getElementById('userName').textContent = currentUser.name || currentUser.email;
    document.getElementById('userRole').textContent = currentUser.role || 'Employee';
    document.getElementById('userAvatar').textContent = (currentUser.name || 'U').charAt(0).toUpperCase();
    
    if (currentUser.role === 'Manager') {
      document.querySelectorAll('.manager-only').forEach(el => el.style.display = 'flex');
    }
    if (currentUser.role === 'Finance Admin') {
      document.querySelectorAll('.manager-only, .finance-only').forEach(el => el.style.display = 'flex');
    }
  } catch (e) {
    console.error('Failed to load user:', e);
  }
}

function setupEventListeners() {
  document.querySelectorAll('.nav-item').forEach(item => {
    item.addEventListener('click', () => {
      const view = item.dataset.view;
      if (view) switchView(view);
    });
  });
  
  document.getElementById('claimForm').addEventListener('submit', handleClaimSubmit);
  document.getElementById('amount').addEventListener('input', checkBudget);
}

function switchView(view) {
  document.querySelectorAll('.nav-item').forEach(item => {
    item.classList.toggle('active', item.dataset.view === view);
  });
  
  document.querySelectorAll('.view').forEach(v => {
    v.classList.toggle('active', v.id === view + 'View');
  });
  
  const titles = {
    dashboard: 'Dashboard',
    'my-claims': 'My Expense Claims',
    'new-claim': 'New Expense Claim',
    approvals: 'Pending Approvals',
    finance: 'Finance Approvals'
  };
  document.getElementById('pageTitle').textContent = titles[view] || 'Dashboard';
  
  if (view === 'my-claims') loadMyClaims();
  if (view === 'approvals') loadManagerApprovals();
  if (view === 'finance') loadFinanceApprovals();
}

async function loadDashboard() {
  try {
    dashboardData = await new Promise((resolve, reject) => {
      google.script.run
        .withSuccessHandler(resolve)
        .withFailureHandler(reject)
        .getDashboardData();
    });
    
    document.getElementById('statTotal').textContent = '₹' + dashboardData.myTotal.toLocaleString();
    document.getElementById('statApproved').textContent = '₹' + dashboardData.approvedTotal.toLocaleString();
    document.getElementById('statPending').textContent = '₹' + dashboardData.pendingTotal.toLocaleString();
    
    renderDonutChart();
    renderBarChart();
    
    // Load pending counts
    if (currentUser.role === 'Manager') {
      const pending = await getPendingManagerCount();
      updateBadge('managerBadge', pending);
    }
    if (currentUser.role === 'Finance Admin') {
      const pending = await getPendingFinanceCount();
      updateBadge('financeBadge', pending);
    }
  } catch (e) {
    console.error('Failed to load dashboard:', e);
  }
}

function renderDonutChart() {
  const container = document.getElementById('donutChart');
  const legend = document.getElementById('donutLegend');
  const total = Object.values(dashboardData.categoryBreakdown).reduce((a, b) => a + b, 0);
  
  document.getElementById('donutTotal').textContent = '₹' + total.toLocaleString();
  
  const colors = {
    'Travel': '#667EEA',
    'Meals': '#F59E0B',
    'Supplies': '#10B981',
    'Equipment': '#EF4444',
    'Training': '#8B5CF6',
    'Communication': '#06B6D4',
    'Other': '#6B7280'
  };
  
  if (total === 0) {
    container.style.background = 'var(--gray-200)';
    legend.innerHTML = '<span style="color: var(--gray-500);">No data yet</span>';
    return;
  }
  
  let gradientParts = [];
  let legendHTML = '';
  let currentDeg = 0;
  
  for (const [cat, amount] of Object.entries(dashboardData.categoryBreakdown)) {
    const deg = (amount / total) * 360;
    gradientParts.push(`${colors[cat]} ${currentDeg}deg ${currentDeg + deg}deg`);
    legendHTML += `
      <div class="legend-item">
        <div class="legend-color" style="background: ${colors[cat]};"></div>
        <span>${cat}</span>
      </div>
    `;
    currentDeg += deg;
  }
  
  container.style.background = `conic-gradient(${gradientParts.join(', ')})`;
  legend.innerHTML = legendHTML;
}

function renderBarChart() {
  const container = document.getElementById('barChart');
  const months = Object.keys(dashboardData.monthlySpend);
  const maxValue = Math.max(...Object.values(dashboardData.monthlySpend), 1);
  
  if (months.length === 0) {
    container.innerHTML = '<div style="text-align: center; color: var(--gray-500); padding: 60px;">No monthly data yet</div>';
    return;
  }
  
  container.innerHTML = months.map(month => {
    const value = dashboardData.monthlySpend[month];
    const height = (value / maxValue) * 150;
    return `
      <div class="bar" style="height: ${height}px;">
        <span class="bar-value">₹${(value/1000).toFixed(0)}k</span>
        <span class="bar-label">${month}</span>
      </div>
    `;
  }).join('');
}

async function loadMyClaims() {
  try {
    const claims = await new Promise((resolve, reject) => {
      google.script.run
        .withSuccessHandler(resolve)
        .withFailureHandler(reject)
        .getMyClaims();
    });
    
    renderClaims(claims);
  } catch (e) {
    showToast('Failed to load claims', 'error');
  }
}

function renderClaims(claims) {
  const container = document.getElementById('claimsList');
  
  if (claims.length === 0) {
    container.innerHTML = `
      <div style="text-align: center; padding: 60px; color: var(--gray-500);">
        <h3>No claims yet</h3>
        <p>Submit your first expense claim</p>
      </div>
    `;
    return;
  }
  
  container.innerHTML = claims.map(claim => `
    <div class="claim-card">
      <div class="claim-avatar">${(currentUser.name || 'U').charAt(0)}</div>
      <div class="claim-details">
        <div class="claim-header">
          <span class="claim-category">${claim.category}</span>
          <span class="status-badge ${claim.status.toLowerCase().replace(' ', '-')}">${claim.status}</span>
        </div>
        <div class="claim-amount">₹${claim.amount.toLocaleString()}</div>
        <div class="claim-date">${formatDate(claim.expenseDate)}</div>
        <div class="claim-description">${claim.description}</div>
      </div>
    </div>
  `).join('');
}

async function loadManagerApprovals() {
  try {
    const claims = await new Promise((resolve, reject) => {
      google.script.run
        .withSuccessHandler(resolve)
        .withFailureHandler(reject)
        .getPendingManagerApprovals();
    });
    
    renderApprovals(claims, 'manager');
  } catch (e) {
    showToast('Failed to load approvals', 'error');
  }
}

async function loadFinanceApprovals() {
  try {
    const claims = await new Promise((resolve, reject) => {
      google.script.run
        .withSuccessHandler(resolve)
        .withFailureHandler(reject)
        .getPendingFinanceApprovals();
    });
    
    renderFinanceApprovals(claims);
  } catch (e) {
    showToast('Failed to load finance approvals', 'error');
  }
}

function renderApprovals(claims, type) {
  const container = document.getElementById('managerApprovals');
  
  if (claims.length === 0) {
    container.innerHTML = `
      <div style="text-align: center; padding: 60px; color: var(--gray-500);">
        <h3>All caught up!</h3>
        <p>No pending approvals</p>
      </div>
    `;
    return;
  }
  
  container.innerHTML = claims.map(claim => `
    <div class="approval-card">
      <div class="approval-header">
        <div class="claim-avatar">${(claim.employeeName || 'U').charAt(0)}</div>
        <div class="approval-info">
          <h4>${claim.employeeName}</h4>
          <p>${claim.employeeEmail}</p>
        </div>
        <span class="status-badge pending">Pending</span>
      </div>
      
      <div class="approval-progress">
        <div class="progress-step">
          <div class="progress-dot complete">✓</div>
          <span class="progress-label">Submitted</span>
        </div>
        <div class="progress-line complete"></div>
        <div class="progress-step">
          <div class="progress-dot active">2</div>
          <span class="progress-label">Manager</span>
        </div>
        <div class="progress-line ${claim.amount > 5000 ? '' : 'complete'}"></div>
        <div class="progress-step">
          <div class="progress-dot ${claim.amount > 5000 ? 'active' : (claim.amount <= 5000 ? 'complete' : '')}">${claim.amount > 5000 ? '3' : '✓'}</div>
          <span class="progress-label">Finance</span>
        </div>
        <div class="progress-line"></div>
        <div class="progress-step">
          <div class="progress-dot">4</div>
          <span class="progress-label">Paid</span>
        </div>
      </div>
      
      <div class="approval-details">
        <div class="approval-row">
          <span class="approval-label">Category</span>
          <span class="approval-value">${claim.category}</span>
        </div>
        <div class="approval-row">
          <span class="approval-label">Amount</span>
          <span class="approval-value" style="font-size: 18px; font-weight: 700;">₹${claim.amount.toLocaleString()}</span>
        </div>
        <div class="approval-row">
          <span class="approval-label">Date</span>
          <span class="approval-value">${formatDate(claim.expenseDate)}</span>
        </div>
        <div class="approval-row">
          <span class="approval-label">Description</span>
          <span class="approval-value">${claim.description}</span>
        </div>
      </div>
      
      <div class="approval-actions">
        <button class="btn btn-danger btn-sm" onclick="rejectClaim('${claim.claimId}')">Reject</button>
        <button class="btn btn-success btn-sm" onclick="approveClaim('${claim.claimId}')">Approve</button>
      </div>
    </div>
  `).join('');
}

function renderFinanceApprovals(claims) {
  const container = document.getElementById('financeApprovals');
  
  if (claims.length === 0) {
    container.innerHTML = `
      <div style="text-align: center; padding: 60px; color: var(--gray-500);">
        <h3>All caught up!</h3>
        <p>No finance approvals needed</p>
      </div>
    `;
    return;
  }
  
  container.innerHTML = claims.map(claim => `
    <div class="approval-card">
      <div class="approval-header">
        <div class="claim-avatar">${(claim.employeeName || 'U').charAt(0)}</div>
        <div class="approval-info">
          <h4>${claim.employeeName}</h4>
          <p>${claim.employeeEmail}</p>
        </div>
        <span class="status-badge pending-finance">Pending Finance</span>
      </div>
      
      <div class="approval-progress">
        <div class="progress-step">
          <div class="progress-dot complete">✓</div>
          <span class="progress-label">Submitted</span>
        </div>
        <div class="progress-line complete"></div>
        <div class="progress-step">
          <div class="progress-dot complete">✓</div>
          <span class="progress-label">Manager</span>
        </div>
        <div class="progress-line complete"></div>
        <div class="progress-step">
          <div class="progress-dot active">3</div>
          <span class="progress-label">Finance</span>
        </div>
        <div class="progress-line"></div>
        <div class="progress-step">
          <div class="progress-dot">4</div>
          <span class="progress-label">Paid</span>
        </div>
      </div>
      
      <div class="approval-details">
        <div class="approval-row">
          <span class="approval-label">Category</span>
          <span class="approval-value">${claim.category}</span>
        </div>
        <div class="approval-row">
          <span class="approval-label">Amount</span>
          <span class="approval-value" style="font-size: 18px; font-weight: 700;">₹${claim.amount.toLocaleString()}</span>
        </div>
        <div class="approval-row">
          <span class="approval-label">Date</span>
          <span class="approval-value">${formatDate(claim.expenseDate)}</span>
        </div>
      </div>
      
      <div class="approval-actions">
        <button class="btn btn-danger btn-sm" onclick="rejectClaim('${claim.claimId}')">Reject</button>
        <button class="btn btn-success btn-sm" onclick="approveFinanceClaim('${claim.claimId}')">Approve</button>
      </div>
    </div>
  `).join('');
}

function checkBudget() {
  const amount = parseFloat(document.getElementById('amount').value) || 0;
  const warning = document.getElementById('budgetWarning');
  
  if (amount > 5000) {
    warning.style.display = 'flex';
  } else {
    warning.style.display = 'none';
  }
}

async function handleClaimSubmit(e) {
  e.preventDefault();
  
  const category = document.getElementById('category').value;
  const amount = parseFloat(document.getElementById('amount').value);
  const expenseDate = document.getElementById('expenseDate').value;
  const description = document.getElementById('description').value;
  
  if (!category || !amount || !expenseDate || !description) {
    showToast('Please fill all required fields', 'error');
    return;
  }
  
  try {
    const result = await new Promise((resolve, reject) => {
      google.script.run
        .withSuccessHandler(resolve)
        .withFailureHandler(reject)
        .submitExpenseClaim(category, amount, expenseDate, description, '');
    });
    
    showToast('Claim submitted successfully!', 'success');
    document.getElementById('claimForm').reset();
    switchView('dashboard');
    loadDashboard();
  } catch (e) {
    showToast(e.message || 'Failed to submit', 'error');
  }
}

async function approveClaim(claimId) {
  try {
    await new Promise((resolve, reject) => {
      google.script.run
        .withSuccessHandler(resolve)
        .withFailureHandler(reject)
        .approveByManager(claimId, '');
    });
    
    showToast('Claim approved!', 'success');
    loadManagerApprovals();
    loadDashboard();
  } catch (e) {
    showToast(e.message || 'Failed to approve', 'error');
  }
}

async function approveFinanceClaim(claimId) {
  try {
    await new Promise((resolve, reject) => {
      google.script.run
        .withSuccessHandler(resolve)
        .withFailureHandler(reject)
        .approveByFinance(claimId, '');
    });
    
    showToast('Claim approved by finance!', 'success');
    loadFinanceApprovals();
    loadDashboard();
  } catch (e) {
    showToast(e.message || 'Failed to approve', 'error');
  }
}

async function rejectClaim(claimId) {
  const reason = prompt('Please provide a reason for rejection:');
  if (!reason) return;
  
  try {
    await new Promise((resolve, reject) => {
      google.script.run
        .withSuccessHandler(resolve)
        .withFailureHandler(reject)
        .rejectClaim(claimId, reason);
    });
    
    showToast('Claim rejected', 'success');
    loadManagerApprovals();
    loadFinanceApprovals();
    loadDashboard();
  } catch (e) {
    showToast(e.message || 'Failed to reject', 'error');
  }
}

async function getPendingManagerCount() {
  try {
    const claims = await new Promise((resolve, reject) => {
      google.script.run
        .withSuccessHandler(resolve)
        .withFailureHandler(reject)
        .getPendingManagerApprovals();
    });
    return claims.length;
  } catch (e) {
    return 0;
  }
}

async function getPendingFinanceCount() {
  try {
    const claims = await new Promise((resolve, reject) => {
      google.script.run
        .withSuccessHandler(resolve)
        .withFailureHandler(reject)
        .getPendingFinanceApprovals();
    });
    return claims.length;
  } catch (e) {
    return 0;
  }
}

function updateBadge(id, count) {
  const badge = document.getElementById(id);
  if (count > 0) {
    badge.textContent = count;
    badge.style.display = 'inline';
  } else {
    badge.style.display = 'none';
  }
}

function formatDate(date) {
  if (!date) return '-';
  return new Date(date).toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
}

function showToast(message, type = 'success') {
  const container = document.getElementById('toastContainer');
  const toast = document.createElement('div');
  toast.className = `toast ${type}`;
  
  const icons = {
    success: '<svg class="toast-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"></polyline></svg>',
    error: '<svg class="toast-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><line x1="15" y1="9" x2="9" y2="15"></line><line x1="9" y1="9" x2="15" y2="15"></line></svg>',
    warning: '<svg class="toast-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path></svg>'
  };
  
  toast.innerHTML = `${icons[type]}<span style="flex: 1;">${message}</span>`;
  container.appendChild(toast);
  
  setTimeout(() => {
    toast.style.opacity = '0';
    setTimeout(() => toast.remove(), 300);
  }, 3000);
}
</script>
